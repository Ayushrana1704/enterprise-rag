
services:
  postgres:
    image: postgres:16
    container_name: enterprise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: enterprise
      POSTGRES_PASSWORD: enterprise123
      POSTGRES_DB: enterprise_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enterprise -d enterprise_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: enterprise-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: